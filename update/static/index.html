<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업데이트 파일 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-body">
                <div class="update-tabs">
                    <button type="button" id="tab-update" class="update-tab-btn active" data-type="update">
                        <i class="fas fa-cloud-upload-alt"></i> 업데이트 파일
                    </button>
                    <button type="button" id="tab-launcher" class="update-tab-btn" data-type="launcher">
                        <i class="fas fa-rocket"></i> 접속기 관리
                    </button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 id="upload-card-title"><i class="fas fa-cloud-upload-alt"></i> 업데이트 파일 등록 / 수정</h2>
            </div>
            <div class="card-body">
                <form id="uploadForm" novalidate>
                    <input type="hidden" id="edit-no" name="no">
                    <div class="filter-bar">
                        <div class="filter-group file-select">
                            <label id="upload-file-label"><i class="fas fa-file-upload"></i> 업데이트 파일</label>
                            <div class="file-input-wrapper">
                                <input type="file" id="fileInput" name="file">
                                <label for="fileInput" class="file-label">파일 선택</label>
                                <span id="fileName" class="file-name">선택된 파일 없음</span>
                            </div>
                        </div>
                        <button type="submit" id="submitBtn" class="search-btn"><i class="fas fa-save"></i> 등록하기</button>
                        <button type="button" id="cancelBtn" class="refresh-btn" style="display:none;"><i class="fas fa-times"></i> 취소</button>
                    </div>
                    <div id="uploadProgressWrap" class="upload-progress-wrap" style="display:none;">
                        <div class="upload-progress-head">
                            <span>업로드 진행률</span>
                            <span id="uploadProgressText">0%</span>
                        </div>
                        <div class="upload-progress-track">
                            <div id="uploadProgressBar" class="upload-progress-bar"></div>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 id="compare-card-title"><i class="fas fa-fingerprint"></i> 최신 등록 파일 MD5 비교</h2>
            </div>
            <div class="card-body">
                <div class="filter-bar compare-filter-bar">
                    <div class="filter-group compare-url-group">
                        <label id="compare-url-label"><i class="fas fa-link"></i> 비교 URL</label>
                        <input type="url" id="compareSourceUrl" class="text-input" placeholder="비교할 파일 URL을 입력하세요">
                    </div>
                    <button type="button" id="saveCompareUrlBtn" class="refresh-btn"><i class="fas fa-save"></i> URL 저장</button>
                    <button type="button" id="runCompareBtn" class="search-btn"><i class="fas fa-not-equal"></i> 비교 실행</button>
                </div>
                <div class="compare-result-grid">
                    <div class="compare-result-card">
                        <span class="compare-label">최근 등록 파일</span>
                        <strong id="compareLocalFile">없음</strong>
                        <code id="compareLocalMd5">-</code>
                    </div>
                    <div class="compare-result-card">
                        <span class="compare-label">URL 파일 MD5</span>
                        <strong id="compareRemoteFile">URL에서 계산</strong>
                        <code id="compareRemoteMd5">-</code>
                    </div>
                    <div class="compare-result-card compare-result-status-card">
                        <span class="compare-label">비교 결과</span>
                        <strong id="compareStatusBadge" class="compare-status-badge neutral">대기 중</strong>
                        <span id="compareCheckedAt" class="compare-meta">아직 비교하지 않았습니다.</span>
                    </div>
                </div>
                <p id="compareMessage" class="compare-message">비교 URL을 저장한 뒤 비교 실행을 누르면 최신 등록 파일과 URL 파일의 MD5를 나란히 확인할 수 있습니다.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 id="list-card-title"><i class="fas fa-list"></i> 업데이트 파일 목록</h2>
            </div>
            <div class="card-body">
                <div class="scroll-table premium-table">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:10%;">No</th>
                                <th style="width:35%;">파일명</th>
                                <th style="width:30%;">MD5 Hash</th>
                                <th style="width:15%;">등록일</th>
                                <th style="width:10%; text-align:center;">관리</th>
                            </tr>
                        </thead>
                        <tbody id="fileList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
