<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>시안 6 - 아틀라스 지도형</title>
<style>
:root{--bg:#f4f7f9;--nav:#0d1723;--text:#14202b;--muted:#657585;--line:#d9e3ec;--panel:#ffffff;--accent:#2f7cf6;--sand:#d7c7a5}
*{box-sizing:border-box}
body{margin:0;font-family:"Pretendard","Noto Sans KR",sans-serif;background:linear-gradient(180deg,#f3f7fa 0%,#ebf1f5 100%);color:var(--text)}
.shell{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
.nav{background:linear-gradient(180deg,#0c1724 0%,#121f30 100%);color:#fff;padding:28px 20px}.logo{font-size:30px;font-weight:900;letter-spacing:-.05em;margin-bottom:26px}.sub{font-size:12px;color:#91a1b5;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}.link{display:block;padding:12px 14px;border-radius:14px;color:#d7e2ee;text-decoration:none;margin-bottom:8px}.link.active{background:rgba(255,255,255,.1);font-weight:800}
.main{padding:28px}.banner{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-bottom:18px}.atlas{min-height:280px;border-radius:28px;background:radial-gradient(circle at 15% 25%,rgba(255,255,255,.45),transparent 20%),linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.08)),linear-gradient(135deg,#8096a5,#596d79);position:relative;overflow:hidden}.atlas:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.12) 1px,transparent 1px);background-size:46px 46px;opacity:.18}.atlas-copy{position:absolute;left:26px;bottom:26px;max-width:420px;color:#fff}.atlas-copy small{display:block;letter-spacing:.18em;text-transform:uppercase;opacity:.75;font-weight:800;margin-bottom:10px}.atlas-copy h1{margin:0;font-size:44px;letter-spacing:-.05em;line-height:.95}.atlas-copy p{margin:12px 0 0;line-height:1.8;color:rgba(255,255,255,.86)}
.sidepanel{background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:22px}.sidepanel h3{margin:0 0 12px;font-size:20px}.check{display:grid;gap:12px}.check-item{padding:14px 16px;border-radius:18px;background:#f7fafc;border:1px solid var(--line)}.check-item strong{display:block;font-size:22px}.check-item span{color:var(--muted);font-size:13px}
.work{background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:18px}.topline{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.topline h2{margin:0;font-size:28px}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:800;color:#5e7285}.tab.active{background:#eaf2ff;color:var(--accent);border-color:#bfd5ff}
.toolbar{display:grid;grid-template-columns:1.5fr 1fr 1fr auto auto;gap:12px;margin-bottom:18px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}.field input,.field select{width:100%;padding:12px;border-radius:14px;border:1px solid var(--line);background:#fff}.btn{padding:12px 16px;border-radius:14px;border:1px solid var(--line);background:#fff;font-weight:800}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.columns{display:grid;grid-template-columns:1fr 380px;gap:18px}.list{display:grid;gap:10px}.entry{display:grid;grid-template-columns:1.25fr .7fr .7fr auto;gap:12px;align-items:center;padding:14px 16px;border-radius:18px;background:#fbfdff;border:1px solid #e4ecf3}.entry strong{display:block}.entry span{font-size:13px;color:var(--muted)}.mini{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eef4ff;color:var(--accent);font-size:12px;font-weight:800}
.editor{border:1px solid var(--line);border-radius:22px;padding:18px;background:linear-gradient(180deg,#fbfdff 0%,#f7fafc 100%)}.editor h3{margin:0 0 14px}.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.editor-grid .full{grid-column:1/-1}textarea{width:100%;min-height:150px;padding:12px;border-radius:14px;border:1px solid var(--line)}
.back{position:fixed;right:20px;bottom:20px;text-decoration:none;color:#fff;background:#0f172a;padding:12px 16px;border-radius:999px;font-weight:800;box-shadow:0 18px 36px rgba(0,0,0,.2)}
@media (max-width:1200px){.shell{grid-template-columns:1fr}.banner,.columns{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="shell">
  <aside class="nav">
    <div class="logo">KARAZHAN</div>
    <div class="sub">관리 영역</div>
    <a class="link" href="#">홈</a>
    <a class="link active" href="#">던전/레이드</a>
    <a class="link" href="#">업데이트</a>
    <a class="link" href="#">통계</a>
  </aside>
  <main class="main">
    <section class="banner">
      <div class="atlas">
        <div class="atlas-copy">
          <small>Atlas View</small>
          <h1>던전 운영 지도</h1>
          <p>맵을 기준으로 던전 운영 흐름을 정리하고, 선택한 구역의 미션과 보상 구조를 오른쪽으로 자연스럽게 이어주는 방향의 시안입니다.</p>
        </div>
      </div>
      <div class="sidepanel">
        <h3>오늘의 운영 체크</h3>
        <div class="check">
          <div class="check-item"><strong>3</strong><span>수정 후 게시 대기</span></div>
          <div class="check-item"><strong>6</strong><span>최근 24시간 실행 수</span></div>
          <div class="check-item"><strong>1</strong><span>실패 원인 재확인 필요</span></div>
        </div>
      </div>
    </section>
    <section class="work">
      <div class="topline">
        <h2>미션 관리</h2>
        <div class="tabs"><button class="tab active">미션</button><button class="tab">테마</button><button class="tab">보상</button><button class="tab">로그</button></div>
      </div>
      <div class="toolbar">
        <div class="field"><label>던전/레이드</label><input value="마나 무덤" /></div>
        <div class="field"><label>게시 상태</label><select><option>전체</option></select></div>
        <div class="field"><label>활성 여부</label><select><option>전체</option></select></div>
        <button class="btn">초기화</button>
        <button class="btn primary">검색</button>
      </div>
      <div class="columns">
        <div class="list">
          <div class="entry"><div><strong>에테리얼 사술사 토벌</strong><span>마나 무덤 · 처치형</span></div><div><span class="mini">게시</span></div><div><span>버전 1</span></div><button class="btn">열기</button></div>
          <div class="entry"><div><strong>팬더모니우스 격파</strong><span>마나 무덤 · 보스형</span></div><div><span class="mini">검토</span></div><div><span>버전 1</span></div><button class="btn">열기</button></div>
        </div>
        <aside class="editor">
          <h3>선택한 미션</h3>
          <div class="editor-grid">
            <div class="field"><label>미션 이름</label><input value="에테리얼 사술사 토벌" /></div>
            <div class="field"><label>제한 시간</label><input value="600" /></div>
            <div class="field full"><label>브리핑</label><textarea>지정된 적을 모두 정리한 뒤 보스를 마무리하는 흐름의 추가 미션입니다.</textarea></div>
          </div>
        </aside>
      </div>
    </section>
  </main>
</div>
<a class="back" href="./index.html">시안 목록</a>
</body>
</html>
