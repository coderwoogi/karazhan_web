<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>시안 4 - 전술 지휘실형</title>
<style>
:root{--bg:#071018;--ink:#eaf4ff;--muted:#8da4b8;--line:rgba(128,197,255,.18);--panel:rgba(9,22,34,.76);--accent:#79c8ff;--accent-2:#b6f0ff;}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;font-family:"Pretendard","Noto Sans KR",sans-serif;color:var(--ink);background:radial-gradient(circle at 20% 20%,rgba(67,120,167,.24),transparent 30%),radial-gradient(circle at 80% 10%,rgba(91,178,255,.12),transparent 25%),linear-gradient(180deg,#05111a 0%,#07131d 100%);} 
.page{min-height:100vh;display:grid;grid-template-columns:260px 1fr;}
.side{padding:28px 18px;border-right:1px solid rgba(255,255,255,.05);background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);} 
.brand{font-size:28px;font-weight:900;letter-spacing:-.05em;margin-bottom:24px}.brand small{display:block;font-size:12px;color:var(--muted);margin-top:8px;letter-spacing:.08em;text-transform:uppercase}
.nav-section{margin-bottom:26px}.nav-label{font-size:12px;color:#5d7893;margin-bottom:10px;text-transform:uppercase;letter-spacing:.12em}.nav a{display:block;padding:12px 14px;border:1px solid transparent;border-radius:14px;color:#d6e8f8;text-decoration:none;margin-bottom:8px;background:rgba(255,255,255,.01)}.nav a.active{border-color:var(--line);background:rgba(121,200,255,.08);color:#fff;box-shadow:inset 0 0 0 1px rgba(121,200,255,.08)}
.main{padding:28px 28px 36px;display:grid;grid-template-rows:auto auto 1fr;gap:18px}
.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}
.hero-copy,.hero-panel,.toolbar,.workspace,.detail{backdrop-filter:blur(10px);background:var(--panel);border:1px solid rgba(121,200,255,.14);border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.hero-copy{padding:28px;position:relative;overflow:hidden}.hero-copy:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(121,200,255,.06),transparent 40%);pointer-events:none}.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-2);margin-bottom:16px;font-weight:800}.hero-copy h1{margin:0;font-size:46px;line-height:1;letter-spacing:-.05em;max-width:10ch}.hero-copy p{margin:14px 0 0;max-width:56ch;color:var(--muted);line-height:1.8}
.hero-panel{padding:24px;display:grid;align-content:space-between}.stats{display:grid;gap:14px}.stat{padding:14px 16px;border-radius:16px;border:1px solid rgba(121,200,255,.12);background:rgba(255,255,255,.02)}.stat strong{display:block;font-size:28px}.stat span{font-size:13px;color:var(--muted)}
.toolbar{padding:14px;display:grid;grid-template-columns:1.3fr 1fr 1fr auto auto;gap:12px;align-items:end}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}.field input,.field select{width:100%;padding:12px 13px;border-radius:14px;border:1px solid rgba(121,200,255,.12);background:rgba(255,255,255,.03);color:#fff}
.btn{padding:12px 16px;border-radius:14px;border:1px solid rgba(121,200,255,.18);background:rgba(255,255,255,.03);color:#e8f6ff;font-weight:800}.btn.primary{background:linear-gradient(135deg,#4e99d0,#7dd6ff);color:#041018;border:none}
.workspace{padding:18px;display:grid;grid-template-columns:1.05fr .95fr;gap:18px}.table-wrap{border:1px solid rgba(121,200,255,.1);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.02)}table{width:100%;border-collapse:collapse}th,td{padding:14px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.06)}th{font-size:12px;color:#8ea7bc;text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.03)}td{font-size:14px}.detail{padding:18px}.detail h3{margin:0 0 14px;font-size:20px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.detail-grid .full{grid-column:1/-1}textarea{width:100%;min-height:140px;padding:12px;border-radius:14px;border:1px solid rgba(121,200,255,.12);background:rgba(255,255,255,.03);color:#fff}
.badge{display:inline-flex;padding:5px 10px;border-radius:999px;background:rgba(121,200,255,.12);border:1px solid rgba(121,200,255,.18);font-size:12px;font-weight:800;color:#d7f3ff}
.back{position:fixed;right:20px;bottom:20px;text-decoration:none;color:#03121d;background:#8ddcff;padding:12px 16px;border-radius:999px;font-weight:800;box-shadow:0 18px 36px rgba(0,0,0,.35)}
@media (max-width:1200px){.hero,.workspace{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.page{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
  <aside class="side">
    <div class="brand">KARAZHAN<small>Operations Grid</small></div>
    <div class="nav-section">
      <div class="nav-label">관리</div>
      <div class="nav">
        <a href="#">홈</a>
        <a href="#" class="active">던전/레이드</a>
        <a href="#">업데이트</a>
        <a href="#">로그</a>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">상태</div>
      <div class="nav"><a href="#">개발 서버</a></div>
    </div>
  </aside>
  <main class="main">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">Dungeon Mission Control</div>
        <h1>던전/레이드 운영 지휘실</h1>
        <p>어떤 던전에서 어떤 미션과 보상이 연결되는지, 그리고 최근 실행 결과가 어떤 흐름으로 누적되는지 한 눈에 파악하는 전술형 레이아웃입니다.</p>
      </div>
      <div class="hero-panel">
        <div class="stats">
          <div class="stat"><strong>12</strong><span>오늘 실행된 런</span></div>
          <div class="stat"><strong>4</strong><span>검토 대기 미션</span></div>
          <div class="stat"><strong>2</strong><span>최근 실패 로그</span></div>
        </div>
      </div>
    </section>
    <section class="toolbar">
      <div class="field"><label>던전/레이드 선택</label><input value="마나 무덤" /></div>
      <div class="field"><label>게시 상태</label><select><option>전체</option></select></div>
      <div class="field"><label>활성 여부</label><select><option>전체</option></select></div>
      <button class="btn">초기화</button>
      <button class="btn primary">검색</button>
    </section>
    <section class="workspace">
      <div class="table-wrap">
        <table>
          <thead><tr><th>미션</th><th>유형</th><th>상태</th></tr></thead>
          <tbody>
            <tr><td>에테리얼 사술사 토벌</td><td>처치형</td><td><span class="badge">게시</span></td></tr>
            <tr><td>팬더모니우스 격파</td><td>보스형</td><td><span class="badge">검토</span></td></tr>
            <tr><td>무사고 돌파</td><td>생존형</td><td><span class="badge">게시</span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="detail">
        <h3>미션 편집</h3>
        <div class="detail-grid">
          <div class="field"><label>미션 이름</label><input value="에테리얼 사술사 토벌" /></div>
          <div class="field"><label>목표 수량</label><input value="12" /></div>
          <div class="field full"><label>설명</label><textarea>지정된 적을 제한 시간 안에 처리합니다.</textarea></div>
        </div>
      </div>
    </section>
  </main>
</div>
<a class="back" href="./index.html">시안 목록</a>
</body>
</html>
