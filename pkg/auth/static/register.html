<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karazhan Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Karazhan</h1>
                <p>회원가입</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="cpassword">비밀번호 확인</label>
                    <input type="password" id="cpassword" name="cpassword" placeholder="비밀번호를 다시 입력하세요" required>
                </div>
                <button type="submit" class="login-btn">가입하기</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="index.html" style="color: #6366f1; text-decoration: none; font-size: 0.9rem;">이미 계정이 있으신가요?
                        로그인</a>
                </div>
            </form>
            <div id="error-msg" style="color: red; margin-top: 10px; font-size: 0.9rem; text-align: center;"></div>
        </div>
    </div>
    <div id="successOverlay" class="success-overlay">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2>회원가입을 축하합니다!</h2>
            <p>카라잔의 새로운 모험가가 되신 것을 환영합니다.<br>지금 바로 로그인하여 게임을 즐겨보세요.</p>
            <div class="user-id-badge" id="displayUsername">USERNAME</div>
            <a href="index.html" class="go-home-btn">로그인하러 가기</a>
        </div>
    </div>

    <!-- Font Awesome for Success Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent = '';
            btn.disabled = true;
            btn.textContent = '처리 중...';

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const cpassword = document.getElementById('cpassword').value;

            if (password !== cpassword) {
                errorMsg.textContent = '비밀번호가 일치하지 않습니다.';
                btn.disabled = false;
                btn.textContent = '가입하기';
                return;
            }

            const formData = new URLSearchParams();
            formData.append('username', username);
            formData.append('email', email);
            formData.append('password', password);

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.status === 'success') {
                    console.log('Registration success, showing overlay and confetti');
                    // Show Success Screen
                    document.getElementById('displayUsername').textContent = username;
                    const overlay = document.getElementById('successOverlay');

                    // Update login link with username parameter
                    const loginBtn = overlay.querySelector('.go-home-btn');
                    loginBtn.href = `index.html?username=${encodeURIComponent(username)}`;

                    overlay.classList.add('active');

                    // Trigger Confetti
                    const duration = 3 * 1000;
                    const end = Date.now() + duration;

                    (function frame() {
                        confetti({
                            particleCount: 3,
                            angle: 60,
                            spread: 55,
                            origin: { x: 0 },
                            colors: ['#6366f1', '#10b981', '#f59e0b'],
                            zIndex: 10001
                        });
                        confetti({
                            particleCount: 3,
                            angle: 120,
                            spread: 55,
                            origin: { x: 1 },
                            colors: ['#6366f1', '#10b981', '#f59e0b'],
                            zIndex: 10001
                        });

                        if (Date.now() < end) {
                            requestAnimationFrame(frame);
                        }
                    }());

                    // Extra burst
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#6366f1', '#10b981', '#f59e0b'],
                        zIndex: 10001
                    });

                } else {
                    errorMsg.textContent = data.message || '가입에 실패했습니다.';
                    btn.disabled = false;
                    btn.textContent = '가입하기';
                }
            } catch (err) {
                errorMsg.textContent = '서버 오류가 발생했습니다.';
                btn.disabled = false;
                btn.textContent = '가입하기';
            }
        };
    </script>
</body>

</html>
