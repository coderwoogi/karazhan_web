<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karazhan Login</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="iridescence-bg" class="iridescence-bg"></div>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>Karazhan</h1>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="아이디를 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력해주세요" required>
                </div>
                <div class="form-options">
                    <label class="checkbox-container">아이디 기억하기
                        <input type="checkbox" id="rememberId">
                        <span class="checkmark"></span>
                    </label>
                </div>
                <button type="submit" class="login-btn">로그인</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="register.html" style="color: #6366f1; text-decoration: none; font-size: 0.9rem;">회원가입</a>
                </div>
                <div class="signup-notice">
                    사이트 회원가입 시 인게임 계정과 연동됩니다.
                </div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="iridescence-bg.js?v=1"></script>
    <script src="click-spark.js?v=1"></script>
    <script src="login.js?v=1"></script>
</body>
</html>
