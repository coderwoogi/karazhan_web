<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선술집</title>
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/home/style.css?v=1007">
    <script>
        var whTooltips = {
            colorLinks: false,
            iconizeLinks: false,
            renameLinks: false
        };
    </script>
    <script src="https://wow.zamimg.com/widgets/power.js"></script>
    <style>
        :root {
            --shop-table-text: #ada292;
            --shop-table-border: rgba(173, 162, 146, 0.28);
            --shop-table-head: rgba(8, 11, 24, 0.92);
            --shop-table-row: rgba(5, 8, 22, 0.74);
            --shop-side-gap: 12px;
        }
        body {
            min-height: 100vh;
            background: #05070f url('/img/shop_bg.jpg') center center / cover no-repeat fixed;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(3, 6, 18, 0.62) 0%, rgba(3, 6, 18, 0.82) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .shop-page-wrap {
            width: 70vw;
            max-width: 70vw;
            margin: 0 auto;
            padding: 1.25rem;
            position: relative;
            z-index: 1;
        }
        .shop-page-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .shop-page-user {
            font-weight: 700;
            color: var(--shop-table-text) !important;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        #shop-page-user-label {
            color: var(--shop-table-text) !important;
        }
        .shop-page-points {
            color: #f59e0b;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .shop-page-wrap .filter-bar {
            background: rgba(8, 12, 28, 0.78) !important;
            border: 1px solid var(--shop-table-border) !important;
            border-radius: 12px !important;
        }
        .shop-page-wrap .filter-group {
            background: transparent !important;
        }
        .shop-page-wrap .card {
            background: transparent !important;
            border: 0 !important;
            backdrop-filter: none;
        }
        .shop-page-wrap .card-header {
            background: rgba(7, 11, 24, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 12px;
            margin: 12px var(--shop-side-gap) 0 var(--shop-side-gap);
        }
        .shop-page-wrap .card-header h2,
        .shop-page-wrap .filter-group label {
            color: var(--shop-table-text);
        }
        .shop-page-wrap .filter-group div {
            color: var(--shop-table-text);
        }
        .shop-page-wrap .filter-group i,
        .shop-page-wrap .filter-group span {
            color: var(--shop-table-text) !important;
        }
        .shop-page-wrap .filter-group input,
        .shop-page-wrap .filter-group select {
            background: rgba(15, 23, 42, 0.9);
            color: var(--shop-table-text);
            border: 1px solid var(--shop-table-border);
        }
        .shop-page-wrap .filter-group input::placeholder {
            color: rgba(173, 162, 146, 0.65);
        }
        .shop-page-wrap .refresh-btn,
        .shop-page-wrap .search-btn {
            background: #ada292 !important;
            color: #000000 !important;
            border: 1px solid rgba(120, 94, 17, 0.65) !important;
        }
        .shop-page-wrap .refresh-btn:hover,
        .shop-page-wrap .search-btn:hover {
            background: #9c917f !important;
            color: #000000 !important;
        }
        .shop-page-wrap .refresh-btn i,
        .shop-page-wrap .search-btn i {
            color: #000000 !important;
        }
        .shop-page-wrap .log-sub-tab-btn {
            padding: 0.5rem 1rem !important;
            border: none !important;
            background-color: transparent !important;
            color: #ada292 !important;
            cursor: pointer;
            font-weight: 600 !important;
            font-size: 0.85rem !important;
            border-radius: 8px !important;
        }
        .shop-page-wrap .log-sub-tab-btn:hover {
            color: #111111 !important;
            background: rgba(173, 162, 146, 0.35) !important;
        }
        .shop-page-wrap .log-sub-tab-btn.active {
            background: #ada292 !important;
            color: #111111 !important;
            box-shadow: var(--shadow-sm);
        }
        .shop-page-wrap .premium-table table thead th {
            background: var(--shop-table-head) !important;
            color: var(--shop-table-text);
            border-bottom: 1px solid var(--shop-table-border);
            letter-spacing: 0.02em;
        }
        .shop-page-wrap .premium-table table tbody tr {
            background: var(--shop-table-row);
            border-bottom: 1px solid var(--shop-table-border);
        }
        .shop-page-wrap .premium-table table tbody tr:hover {
            background: var(--shop-table-row);
        }
        .shop-page-wrap .premium-table table tbody td {
            color: var(--shop-table-text);
        }
        .shop-page-wrap .premium-table table tbody td *:not(img):not(i) {
            color: var(--shop-table-text) !important;
        }
        .shop-page-wrap .log-sub-tabs {
            display: flex;
            gap: 0.5rem;
            margin: 1.5rem var(--shop-side-gap) 1rem var(--shop-side-gap);
            background: rgba(173, 162, 146, 0.22);
            padding: 0.25rem;
            border-radius: 12px;
            width: fit-content;
            border: none;
        }
        .shop-page-wrap .log-sub-content {
            background: transparent !important;
        }
        .shop-page-wrap .log-sub-content > .card-body {
            padding-left: var(--shop-side-gap) !important;
            padding-right: var(--shop-side-gap) !important;
        }
        .shop-page-wrap .scroll-table.premium-table {
            background: transparent !important;
            border: 0 !important;
            box-shadow: none !important;
            padding: 0 !important;
        }
        @media (max-width: 1280px) {
            .shop-page-wrap {
                width: 90vw;
                max-width: 90vw;
            }
        }
        .shop-page-wrap .premium-table table {
            width: 100%;
            border-collapse: separate !important;
            border-spacing: 0 10px !important;
            background: transparent !important;
            border: 0 !important;
        }
        .shop-page-wrap .premium-table thead th {
            border-top: 1px solid var(--shop-table-border) !important;
            border-bottom: 1px solid var(--shop-table-border) !important;
        }
        .shop-page-wrap .premium-table thead th:first-child {
            border-left: 1px solid var(--shop-table-border) !important;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
        }
        .shop-page-wrap .premium-table thead th:last-child {
            border-right: 1px solid var(--shop-table-border) !important;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
        }
        .shop-page-wrap .premium-table tbody tr {
            outline: 1px solid var(--shop-table-border);
            border-radius: 12px;
            box-shadow: inset 0 0 0 1px rgba(9, 11, 24, 0.35);
            transition: outline-color 0.18s ease, box-shadow 0.18s ease;
        }
        .shop-page-wrap .premium-table tbody tr:nth-child(odd) td {
            background: rgba(89,84,74,.12) !important;
        }
        .shop-page-wrap .premium-table tbody tr:nth-child(even) td {
            background: rgba(16,17,19,.51) !important;
        }
        .shop-page-wrap .premium-table tbody tr:hover,
        .shop-page-wrap .premium-table table tbody tr:hover {
            background: transparent !important;
        }
        .shop-page-wrap .premium-table tbody tr:nth-child(odd):hover td {
            background: rgba(89,84,74,.12) !important;
        }
        .shop-page-wrap .premium-table tbody tr:nth-child(even):hover td {
            background: rgba(16,17,19,.51) !important;
        }
        .shop-page-wrap .premium-table tbody tr:hover {
            outline-color: rgba(173, 162, 146, 0.66);
            box-shadow: inset 0 0 0 1px rgba(173, 162, 146, 0.66);
        }
        .shop-page-wrap .premium-table tbody td {
            border-top: 1px solid transparent !important;
            border-bottom: 1px solid transparent !important;
        }
        .shop-page-wrap .premium-table tbody td:first-child {
            border-left: 1px solid var(--shop-table-border) !important;
            border-top-left-radius: 12px;
            border-bottom-left-radius: 12px;
            padding-left: 14px;
        }
        .shop-page-wrap .premium-table tbody td:last-child {
            border-right: 1px solid var(--shop-table-border) !important;
            border-top-right-radius: 12px;
            border-bottom-right-radius: 12px;
            padding-right: 14px;
        }
        .shop-table-action-btn {
            min-width: 120px;
            height: 40px;
            border-radius: 10px;
            border: 0;
            background: #ada292;
            color: #000000;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 0 0 1px rgba(120, 94, 17, 0.65) inset;
            text-shadow: none !important;
        }
        .shop-table-action-btn,
        .shop-table-action-btn *,
        .shop-page-wrap .shop-table-action-btn,
        .shop-page-wrap .shop-table-action-btn *,
        .shop-page-wrap .premium-table .shop-table-action-btn,
        .shop-page-wrap .premium-table .shop-table-action-btn * {
            color: #000000 !important;
        }
        .shop-table-cancel-btn {
            min-width: 110px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid rgba(120, 94, 17, 0.65);
            background: #ada292;
            color: #000000;
            font-weight: 800;
        }
        .shop-page-wrap .btn {
            background: #ada292;
            color: #000000;
            border: 1px solid rgba(120, 94, 17, 0.65);
        }
        .shop-page-wrap .btn:hover {
            background: #9c917f;
            color: #000000;
        }
        .shop-page-wrap .btn i {
            color: #000000 !important;
        }
        .shop-page-wrap .pagination-stable .page-btn,
        .shop-page-wrap .page-btn {
            background: #ada292 !important;
            color: #000000 !important;
            border: 1px solid rgba(120, 94, 17, 0.65) !important;
        }
        .shop-page-wrap .pagination-stable .page-btn:hover:not(:disabled),
        .shop-page-wrap .page-btn:hover:not(:disabled) {
            background: #9c917f !important;
            color: #000000 !important;
        }
        .shop-page-wrap .pagination-stable .page-btn.active,
        .shop-page-wrap .page-btn.active {
            background: #9c917f !important;
            color: #000000 !important;
            border-color: rgba(120, 94, 17, 0.85) !important;
        }
            .shop-store-layout {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 22px;
            align-items: start;
        }
        .shop-store-sidebar,
        .shop-store-panel {
            background: rgba(9, 13, 28, 0.74);
            border: 1px solid rgba(173, 162, 146, 0.22);
            border-radius: 18px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
        }
        .shop-store-sidebar {
            padding: 20px;
            position: sticky;
            top: 18px;
        }
        .shop-store-panel {
            padding: 20px;
        }
        .shop-store-section + .shop-store-section {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(173, 162, 146, 0.14);
        }
        .shop-store-label {
            display: block;
            margin-bottom: 8px;
            color: #c7bba7;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .shop-store-copy {
            color: rgba(221, 214, 202, 0.9);
            font-size: 0.92rem;
            line-height: 1.7;
        }
        .shop-store-search {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .shop-store-search input {
            width: 100%;
            height: 46px;
            border-radius: 12px;
            border: 1px solid rgba(173, 162, 146, 0.28);
            background: rgba(10, 14, 27, 0.94);
            color: #f5efe4;
            padding: 0 14px;
        }
        .shop-store-search input::placeholder {
            color: rgba(173, 162, 146, 0.6);
        }
        .shop-store-meta {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .shop-store-meta-card {
            padding: 14px;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(18, 25, 46, 0.95) 0%, rgba(10, 14, 28, 0.95) 100%);
            border: 1px solid rgba(173, 162, 146, 0.18);
        }
        .shop-store-meta-card strong {
            display: block;
            color: #f3ead9;
            font-size: 1.15rem;
            margin-top: 4px;
        }
        .shop-store-grid-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(173, 162, 146, 0.14);
        }
        .shop-store-grid-head h3 {
            margin: 0;
            color: #f4ecdc;
            font-size: 1.15rem;
            font-weight: 800;
        }
        .shop-store-grid-head p {
            margin: 6px 0 0;
            color: rgba(221, 214, 202, 0.8);
            font-size: 0.88rem;
        }
        .shop-store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }
        .shop-store-empty {
            padding: 48px 16px;
            text-align: center;
            color: rgba(221, 214, 202, 0.72);
        }
        .shop-product-card {
            position: relative;
            min-height: 400px;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(22, 28, 50, 0.94) 0%, rgba(9, 13, 26, 0.96) 100%);
            border: 1px solid rgba(173, 162, 146, 0.22);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 14px 30px rgba(0,0,0,0.22);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }
        .shop-product-card:hover {
            transform: translateY(-4px);
            border-color: rgba(173, 162, 146, 0.42);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 18px 36px rgba(0,0,0,0.24);
        }
        .shop-product-media,
        .shop-product-media > a,
        .shop-product-media-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
            overflow: hidden;
        }
        .shop-product-media > *,
        .shop-product-media > a > *,
        .shop-product-media-loader > * {
            width: 100%;
            height: 100%;
        }
        .shop-product-media-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .shop-product-media-fallback,
        .shop-product-media-loader {
            background:
                radial-gradient(circle at top, rgba(173, 162, 146, 0.18), transparent 44%),
                linear-gradient(180deg, rgba(16, 20, 37, 0.98), rgba(7, 10, 21, 0.98));
        }
        .shop-product-media-fallback-icon {
            width: 84px !important;
            height: 84px !important;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(7, 10, 21, 0.78);
            color: rgba(244, 236, 220, 0.76);
            font-size: 2rem;
            border: 1px solid rgba(173, 162, 146, 0.24);
        }
        .shop-product-shade {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(4, 6, 16, 0.12) 0%, rgba(4, 6, 16, 0.18) 36%, rgba(4, 6, 16, 0.86) 100%),
                radial-gradient(circle at top right, rgba(173, 162, 146, 0.16), transparent 38%);
            z-index: 1;
            pointer-events: none;
        }
        .shop-product-title-wrap {
            position: absolute;
            inset: auto 0 0 0;
            z-index: 2;
            padding: 16px 16px 18px;
        }
        .shop-product-title {
            margin: 0;
            color: #f6efdf;
            font-size: 1.04rem;
            font-weight: 800;
            line-height: 1.45;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }
        .shop-product-price-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            color: #f4ecdc;
            font-size: 0.96rem;
            font-weight: 800;
        }
        .shop-detail-swal-popup {
            border: 1px solid rgba(173, 162, 146, 0.22) !important;
            border-radius: 24px !important;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34) !important;
        }
        .shop-detail-swal-title {
            color: #f6efdf !important;
            font-weight: 900 !important;
            letter-spacing: 0.01em;
        }
        .shop-detail-swal-confirm,
        .shop-detail-swal-cancel {
            min-width: 132px;
            height: 44px;
            border: 0;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.95rem;
            transition: filter 0.18s ease, transform 0.18s ease;
        }
        .shop-detail-swal-confirm {
            background: #ada292 !important;
            color: #111827 !important;
            margin-right: 10px;
        }
        .shop-detail-swal-cancel {
            background: rgba(173, 162, 146, 0.12) !important;
            color: #f4ecdc !important;
            border: 1px solid rgba(173, 162, 146, 0.2) !important;
        }
        .shop-detail-swal-confirm:hover,
        .shop-detail-swal-cancel:hover {
            filter: brightness(1.05);
            transform: translateY(-1px);
        }
        @media (max-width: 1080px) {
            .shop-store-layout {
                grid-template-columns: 1fr;
            }
            .shop-store-sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
<div class="shop-page-wrap">
    <div class="shop-page-top">
        <div class="shop-page-user">
            <i class="fas fa-store"></i>
            <span id="shop-page-user-label">선술집</span>
            <span class="shop-page-points"><img src="/img/web_point.png" alt="point" style="width:16px; height:16px; object-fit:contain;"><span id="user-points-display">0</span></span>
        </div>
        <button type="button" class="refresh-btn" onclick="location.href='/home/'"><i class="fas fa-arrow-left"></i> 홈으로</button>
    </div>

    <div class="card flex-card">
        <div class="card-header">
            <h2><i class="fas fa-store"></i> 선술집</h2>
            <button onclick="loadShopPage()" class="refresh-btn">새로고침</button>
        </div>
        <div class="log-sub-tabs">
            <button id="shop-sub-btn-items" class="log-sub-tab-btn active" onclick="openShopSubTab('items')">상품목록</button>
            <button id="shop-sub-btn-coin" class="log-sub-tab-btn" onclick="openShopSubTab('coin')">코인시장</button>
        </div>
        <div id="shop-sub-items" class="log-sub-content active">
            <div class="card-body" style="padding:1.5rem;">
                <div class="shop-store-layout">
                    <aside class="shop-store-sidebar">
                        <div class="shop-store-section">
                            <span class="shop-store-label">선술집 안내</span>
                            <div class="shop-store-copy">보유 포인트로 상품을 구매할 수 있습니다. 인게임 아이템은 선택한 캐릭터 우편으로 지급되며, 기능 상품은 구매 즉시 서버 기능에 반영됩니다.</div>
                        </div>
                        <div class="shop-store-section">
                            <span class="shop-store-label">상품 검색</span>
                            <div class="shop-store-search">
                                <input id="shop-search-input" type="text" placeholder="원하는 상품명을 입력하세요" onkeypress="if(event.key==='Enter') loadShopItems()">
                                <button class="search-btn" onclick="loadShopItems()"><i class="fas fa-search"></i> 검색</button>
                            </div>
                        </div>
                        <div class="shop-store-section">
                            <span class="shop-store-label">상점 정보</span>
                            <div class="shop-store-meta">
                                <div class="shop-store-meta-card">
                                    <div class="shop-store-label" style="margin-bottom:0;">보유 포인트</div>
                                    <strong id="shop-items-point-summary">0 P</strong>
                                </div>
                                <div class="shop-store-meta-card">
                                    <div class="shop-store-label" style="margin-bottom:0;">등록 상품</div>
                                    <strong id="shop-items-count-summary">0개</strong>
                                </div>
                            </div>
                        </div>
                    </aside>
                    <section class="shop-store-panel">
                        <div class="shop-store-grid-head">
                            <div>
                                <h3>상품목록</h3>
                                <p>카드형 상품 진열 UI로 빠르게 둘러보고 바로 구매할 수 있습니다.</p>
                            </div>
                            <button class="refresh-btn" onclick="loadShopItems()"><i class="fas fa-rotate"></i> 새로고침</button>
                        </div>
                        <div id="shop-items-body" class="shop-store-grid"></div>
                    </section>
                </div>
                <div id="shop-items-pagination" style="margin-top: 1rem;"></div>
            </div>
        </div>
        <div id="shop-sub-coin" class="log-sub-content" style="display:none;">
            <div class="card-body" style="padding:1.5rem;">
                <div class="filter-bar" style="margin-bottom:0.75rem;">
                    <div class="filter-group" style="flex:1;">
                        <label>코인시장 안내</label>
                        <div style="font-size:0.85rem; color:var(--text-secondary);">유저가 보유한 골드를 판매하고, 다른 유저가 웹포인트로 구매할 수 있습니다. 판매 등록 시 골드는 즉시 보관 처리됩니다.</div>
                    </div>
                </div>
                <div class="filter-bar" style="margin-bottom:1rem;">
                    <div class="filter-group" style="flex:1;">
                        <label>코인시장</label>
                        <div style="font-size:0.85rem; color:var(--text-secondary);">골드 판매는 모달에서 등록합니다.</div>
                    </div>
                    <button class="btn btn-primary" onclick="openShopCoinSellModal()"><i class="fas fa-plus"></i> 판매 등록</button>
                    <button class="refresh-btn" onclick="loadShopCoinMarketPage()"><i class="fas fa-undo"></i> 새로고침</button>
                </div>
                <div class="scroll-table premium-table" style="margin-bottom:1rem;">
                    <table>
                        <thead>
                        <tr>
                            <th style="width:80px;">번호</th>
                            <th style="width:170px;">날짜</th>
                            <th style="width:140px;">골드</th>
                            <th>판매자</th>
                            <th style="width:170px;">서버</th>
                            <th style="width:140px;">비율</th>
                            <th style="width:190px; text-align:center;">가격</th>
                        </tr>
                        </thead>
                        <tbody id="shop-coin-market-body"></tbody>
                    </table>
                </div>
                <div id="shop-coin-market-pagination" style="margin-top:1rem;"></div>
            </div>
        </div>
    </div>
</div>

<div id="shop-coin-sell-modal" class="modal-overlay" style="z-index:12030; display:none;">
    <div class="modal-content-premium" style="max-width:620px; width:92%;">
        <div class="modal-header-premium">
            <h3>코인시장 판매 등록</h3>
            <button type="button" class="modal-close-btn" onclick="closeShopCoinSellModal()">&times;</button>
        </div>
        <div class="modal-body-premium">
            <div class="filter-group" style="margin-bottom:10px;">
                <label>판매 캐릭터</label>
                <select id="shop-coin-modal-character" class="search-select" onchange="onChangeShopCoinSellerCharacter('shop-coin-modal-character','shop-coin-modal-gold')"></select>
            </div>
            <div class="filter-group" style="margin-bottom:10px;">
                <label>보유 골드</label>
                <div id="shop-coin-modal-gold" class="input-premium" style="min-height:40px; display:flex; align-items:center;"></div>
            </div>
            <div class="filter-group" style="margin-bottom:10px;">
                <label>판매 골드</label>
                <input id="shop-coin-modal-sell-gold" type="number" min="1" placeholder="예: 1000">
            </div>
            <div class="filter-group">
                <label>판매 포인트</label>
                <input id="shop-coin-modal-sell-price" type="number" min="1" placeholder="예: 500">
            </div>
        </div>
        <div class="modal-footer-premium">
            <button type="button" class="btn" style="background:#f1f5f9; color:#64748b;" onclick="closeShopCoinSellModal()">취소</button>
            <button type="button" class="btn btn-primary" onclick="createShopCoinListing()">등록</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="/home/shop.js?v=20260306_1"></script>
<script src="/shop/shoppage.js?v=20260306_1"></script>
</body>
